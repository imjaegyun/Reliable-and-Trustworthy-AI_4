# alpha-beta-CROWN config for the assignment toy model.
# The model/data functions are defined in custom/toy_model_data.py.

general:
  device: cpu
  complete_verifier: bab
  enable_incomplete_verification: true

model:
  name: Customized("toy_model_data", "build_toy_model", in_channel=2, out_dim=2)
  input_shape: [-1, 2]

data:
  dataset: Customized("toy_model_data", "toy_box_data")
  num_outputs: 2
  start: 0
  end: 1

specification:
  type: lp
  norm: .inf
  epsilon: 0.05

attack:
  pgd_order: skip

solver:
  batch_size: 128
  beta-crown:
    iteration: 20

bab:
  timeout: 30
